schema_version: 1
tax_year: 2026

# 所得税（累進課税、7段階）。2015年分以降の実際の税率表に準拠。
# upper_bound: null は最終ブラケット（上限なし）
income_tax:
  employment_income_deduction:
    # 給与所得控除（2020年分以降の実際の速算表）。区分ごとに base_amount + 収入金額×rate。
    # rate=0 の区分は base_amount をそのまま固定額として使う（下限・上限の頭打ち）。
    - upper_bound: 1625000
      rate: 0.0
      base_amount: 550000
    - upper_bound: 1800000
      rate: 0.4
      base_amount: -100000
    - upper_bound: 3600000
      rate: 0.3
      base_amount: 80000
    - upper_bound: 6600000
      rate: 0.2
      base_amount: 440000
    - upper_bound: 8500000
      rate: 0.1
      base_amount: 1100000
    - upper_bound: null
      rate: 0.0
      base_amount: 1950000
  pension_deduction_under_65:
    # 公的年金等控除（65歳未満、2020年分以降の速算表）。公的年金等以外の所得が1,000万円以下の場合。
    - upper_bound: 1300000
      rate: 0.0
      base_amount: 600000
    - upper_bound: 4100000
      rate: 0.25
      base_amount: 275000
    - upper_bound: 7700000
      rate: 0.15
      base_amount: 685000
    - upper_bound: 10000000
      rate: 0.05
      base_amount: 1455000
    - upper_bound: null
      rate: 0.0
      base_amount: 1955000
  pension_deduction_65_or_older:
    # 公的年金等控除（65歳以上、2020年分以降の速算表）。公的年金等以外の所得が1,000万円以下の場合。
    - upper_bound: 3300000
      rate: 0.0
      base_amount: 1100000
    - upper_bound: 4100000
      rate: 0.25
      base_amount: 275000
    - upper_bound: 7700000
      rate: 0.15
      base_amount: 685000
    - upper_bound: 10000000
      rate: 0.05
      base_amount: 1455000
    - upper_bound: null
      rate: 0.0
      base_amount: 1955000
  basic_deduction: 480000
  spouse_deduction: 380000
  brackets:
    - upper_bound: 1950000
      rate: 0.05
    - upper_bound: 3300000
      rate: 0.10
    - upper_bound: 6950000
      rate: 0.20
    - upper_bound: 9000000
      rate: 0.23
    - upper_bound: 18000000
      rate: 0.33
    - upper_bound: 40000000
      rate: 0.40
    - upper_bound: null
      rate: 0.45

# 住民税。実際の税率(所得割10%)・均等割(標準額)に準拠した簡易版。
# 課税標準は所得税と同じtaxable_incomeを流用する（住民税独自の基礎控除43万円との差異は無視するMVP簡略化）。
resident_tax:
  flat_rate: 0.10
  per_capita_levy: 5000

# 社会保険料。標準報酬月額の等級表そのものは非対応で、年収に対する合算料率を掛けるMVP簡略化。
# 健康保険・厚生年金は標準報酬月額に上限があるため、年収換算の上限額を超える分には保険料をかけない
# （協会けんぽ・厚生年金保険の標準報酬月額上限に基づく概算値。雇用保険には上限がない）。
# health_insurance_cap: 標準報酬月額上限139万円(第50等級)×12ヶ月の概算
# pension_insurance_cap: 標準報酬月額上限65万円(第32等級)×12ヶ月
social_insurance:
  health_insurance_rate: 0.05
  pension_insurance_rate: 0.0915
  employment_insurance_rate: 0.006
  health_insurance_cap: 16680000
  pension_insurance_cap: 7800000

# 譲渡税。課税口座(特定口座/TAXABLE)からの取り崩し時、平均取得原価方式で算出した譲渡益に課税する。
# 申告分離課税の実際の税率(所得税15%+復興特別所得税0.315%+住民税5% = 20.315%)。
capital_gains:
  rate: 0.20315
