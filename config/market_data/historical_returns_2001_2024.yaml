# 過去の年次リターンデータセット（Monte Carlo Engineの分布推定・Historical Engineのバックテストで使用）。
#
# データの信頼性について（重要）:
#   - equity_sp500 / bond_us_treasury: いずれもAswath Damodaran教授（NYU Stern）が公開している
#     "Historical Returns on Stocks, Bonds and Bills: 1928-Current" データセットに基づく実データ。
#     equity_sp500はS&P500トータルリターン（配当込み）、bond_us_treasuryは10年米国債の
#     トータルリターン（値上がり益＋クーポン）。出典: https://pages.stern.nyu.edu/~adamodar/New_Home_Page/datafile/histretSP.html
#   - btc（BTC）は資産クラスとして登録済み（config/asset_classes.yaml）だが、信頼できる
#     長期年次リターン系列を未調査のため、このファイルにはまだ含めていない。BTC保有を含む
#     Plan/PortfolioでMonte Carlo/Historical Engineを実行すると、BTC部分の加重は
#     ゼロリターン扱いになる点に注意（決定論的なProjection Engineはこの制約を受けない）。
#   - 本データセットは米ドル建ての指数を、為替換算せずそのままリターン系列として扱う簡略化データ
#     セットである。円換算した場合の為替変動リスクは反映していない。

