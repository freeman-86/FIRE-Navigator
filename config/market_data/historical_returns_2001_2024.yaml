# 過去の年次リターンデータセット（Monte Carlo Engineの分布推定・Historical Engineのバックテストで使用）。
#
# データの信頼性について（重要）:
#   - domestic_equity / global_equity: Web検索で実際の指数値を調査し記載（出典を各系列に明記）。
#     domestic_equity は TOPIX 500 の価格リターン（配当除く）、global_equity は MSCI ACWI Net (USD)。
#   - domestic_bond / global_bond: 検証済みの年次系列を取得できなかったため、一般に知られている
#     資産クラスの特性（低ボラティリティ、2022年の世界的な債券急落等）に基づく「参考値・検証未完了」
#     の例示的な系列。global_bondの2022年（-16%）のみ実際の報道値（Bloomberg Global Aggregate、
#     2022年に指数開始以来最大の下落）に基づく。実際の資産運用判断にこのデータをそのまま使わないこと。
#   - このファイルは日本円ベースの投資家を想定した簡略化データセットであり、為替ヘッジの有無等の
#     詳細な条件は考慮していない。

